---
# tasks file for roles/docker

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

# add Docker's GPG key
- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'


# Since 'gather_facts: no' is set in playbook.yml to save time,
# standard variables like 'ansible_distribution_release' are undefined by default.
# We explicitly gather them here to avoid the 'undefined variable' failure.
- name: Gather system facts to get architecture and release
  ansible.builtin.setup:
    filter:
      - ansible_distribution_release
      - deb_architecture
      - ansible_architecture

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >
      deb [arch={{ deb_architecture[ansible_architecture] | default('amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Start and enable Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes

# Allow the vagrant user to run Docker commands without using sudo, which is required for automated tasks
- name: Add user to docker group
  ansible.builtin.user:
    name: vagrant
    groups: docker
    append: yes


- name: Check if docker command exists
  ansible.builtin.shell: "command -v docker"
  register: docker_check
  ignore_errors: yes

- name: Assert docker is NOT installed
  ansible.builtin.assert:
    that:
      - docker_check.rc == 0
    fail_msg: "Docker is not installed on this host."