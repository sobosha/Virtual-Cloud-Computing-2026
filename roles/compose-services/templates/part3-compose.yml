services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER : "{{ db_user }}"
      POSTGRES_PASSWORD : "{{ db_password }}"
      POSTGRES_DB : "{{ db_name }}"
    volumes:
      - "{{ data_dir }}/pgdata:/var/lib/postgresql/data"
      - "{{ data_dir }}/configs/pgsql:/docker-entrypoint-initdb.d:ro"
    networks:
      net:

  authelia:
    image: authelia
    environment:
      TZ : "Europe/Rome"
    extra_hosts:
      - "auth.vcc.local:127.0.0.1"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authelia.rule=Host(`auth.{{ domain_name }}`)"
      - "traefik.http.routers.authelia.entrypoints=websecure"
      - "traefik.http.routers.authelia.tls=true"
      - "traefik.http.services.authelia.loadbalancer.server.port=9091"
    volumes:
      - "{{ data_dir }}/configs/authelia:/config"
    networks:
      net:

  forgejo:
    image: forgejo
    environment:
      DB_USER: "{{ db_user }}"
      DB_PASS: "{{ db_password }}"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "{{ db_name }}"
      FORGEJO_ADMIN_USER: "{{ forgejo_admin_username }}"
      FORGEJO_ADMIN_PASS: "{{ forgejo_admin_password }}"
      FORGEJO_ADMIN_EMAIL: "{{ forgejo_admin_email }}"
      FORGEJO_OIDC_CLIENT_ID: "{{ forgejo_oidc_client_id }}"
      FORGEJO_OIDC_CLIENT_SECRET: "{{ forgejo_oidc_client_secret }}"
    extra_hosts:
      - "auth.vcc.local:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo.rule=Host(`git.{{ domain_name }}`)"
      - "traefik.http.routers.forgejo.entrypoints=websecure"
      - "traefik.http.routers.forgejo.tls=true"
      - "traefik.http.services.forgejo.loadbalancer.server.port=3200"
    volumes:
      - "{{ data_dir }}/forgejo:/data"
      - "{{ data_dir }}/configs/forgejo/forgejo.ini:/conf/app.ini:ro"
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - "{{ data_dir }}/certs/wildcard.crt:/usr/local/share/ca-certificates/wildcard.crt:ro"
    networks:
      net: