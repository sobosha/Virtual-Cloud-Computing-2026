services:
  loki:
    image: grafana/loki:3.6.0
    deploy:
      replicas: 1
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - "{{ data_dir }}/loki_data:/loki"
    networks:
      net:

  grafana:
    image: "{{ registry_address }}/grafana"
    deploy:
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.grafana.rule=Host(`mon.{{ domain_name }}`)"
        - "traefik.http.routers.grafana.entrypoints=websecure"
        - "traefik.http.routers.grafana.tls=true" 
        - "traefik.http.services.grafana.loadbalancer.server.port={{ grafana_port }}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:{{ grafana_port }}/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    environment:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
      # I can Add email admin also here
      GF_SERVER_ROOT_URL: "https://mon.{{ domain_name }}"
      GF_DATABASE_HOST: "{{ db_host }}"
      GF_DATABASE_PORT: "{{ db_port }}"
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_NAME: "{{ grafana_db }}"
      GF_DATABASE_USER: "{{ grafana_db_user }}"
      GF_DATABASE_PASSWORD: "{{ grafana_db_password }}"
      # TODO[VCC-016a]: Configure Grafana to use Authelia for authentication
      # see https://grafana.com/docs/grafana/latest/setup-grafana/configure-access/configure-authentication/generic-oauth/
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Authelia"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "{{ grafana_oidc_client_id }}"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ grafana_oidc_client_secret }}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email groups"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "https://auth.{{ domain_name }}/api/oidc/authorization"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "https://auth.{{ domain_name }}/api/oidc/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "https://auth.{{ domain_name }}/api/oidc/userinfo"
      GF_AUTH_GENERIC_OAUTH_TLS_SKIP_VERIFY_INSECURE: "true"
      # Maps Authelia groups to Grafana roles (Admin for "admins" group, otherwise Viewer)
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(groups, 'admins') && 'Admin' || 'Viewer'"

    volumes:
      # to mount this volume it is necessary to give grafana user write permissions on the host folder
      # - "{{ data_dir }}/grafana:/var/lib/grafana"
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - "{{ data_dir }}/configs/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro"
      - "{{ data_dir }}/configs/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro"
      # TODO[VCC-024]: Create meaningful Grafana dashboards (do NOT import ready-made dashboards)
      #   The goal is to design dashboards that *you* understand and can explain.
      #   Requirements:
      #     1) Create 2–3 thematic dashboards.
      #        Suggested themes: service health, node/host metrics, troubleshooting/correlation.
      #     2) Select the metrics yourselves (Traefik, Forgejo, Authelia, Postgres, etc.)
      #        and be ready to explain *why* each panel is useful.
      #     3) Demonstrate at least one correlation workflow:
      #           - A metric spike panel (e.g., errors, latency)
      #           - A log panel below that automatically follows the time window.
      #     4) Export the dashboards and configure Grafana provisioning
      #        so they load automatically at startup.
      # required for SSO to work
      - "{{ data_dir }}/certs/wildcard.crt:/usr/local/share/ca-certificates/wildcard.crt:ro"
    networks:
      net:
    extra_hosts:
      - "mon.{{ domain_name }}:{{ keepalive_virtual_ip }}"
      - "auth.{{ domain_name }}:{{ keepalive_virtual_ip }}"
      - "git.{{ domain_name }}:{{ keepalive_virtual_ip }}"

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    deploy:
      replicas: 1
    volumes:
      - "{{ data_dir }}/configs/prometheus:/etc/prometheus/"
      - "{{ data_dir }}/prometheus_data:/prometheus"
    networks:
      net:

  alloy:
    image: grafana/alloy:v1.12.0
    # expose port for metrics scraping
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:{{ alloy_port }}"]
    deploy:
      mode: global
{% if not production_mode %}
    ports:
      - target: {{ alloy_port }}
        published: {{ alloy_port }}
{% endif %}
    environment:
      DB_USER: "{{ db_user }}"
      DB_PASSWORD: "{{ db_password }}"
      DB_NAME: "{{ db_name }}"
      DB_HOST: "db" {% raw %}
      NODE: "{{.Node.Hostname}}"
{% endraw %}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ data_dir }}/configs/alloy:/etc/alloy:ro"
    networks:
      net: