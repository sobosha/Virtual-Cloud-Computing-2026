# authelia
authelia_db_user: authelia
authelia_db_password: "{{ vaulted_authelia_db_password if production_mode else 'authelia_pass' }}"
vaulted_authelia_db_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          64323463316436623666336639633966326539623465343733353361383434346330393938333534
          6237643265373765306362633033303039326537336437630a363863313064633536646630393139
