---
# include control node in targets (used for three node swarm setups)
include_controlnode_in_targets: false

# networks
workload_network: 192.168.255.0/24
storage_network: 10.10.255.0/24

# domain name
domain_name: vcc.local

# docker images to build using files in roles/docker-images/files/images/[image_name]
docker_build_images:
  - forgejo
  - authelia
  - grafana

# build args for each image
docker_build_args:
  forgejo:
    VERSION: "11.0.8"
  authelia:
    VERSION: "4.39.14"
  grafana:
    VERSION: "12.3.0"

# data directory: where persistent data is stored on each target node
data_dir: "/data"

#### COMPOSE #####

# # compose services configuration
# # Create directories to persist container data on {{ data_dir }}/[data_directory]
# compose_data_directories:
#   - mysql
# compose_nuke_data_directories: true # you WILL lose your data

# # List of directories to copy files from roles/compose-services/templates/configs/[config_directory]
# # to {{ data_dir }}/configs/[config_directory] applying templating
# compose_config_directories:
#   - wordpress
#   - certs
#   - traefik
#   - authelia
# compose_nuke_config_directories: true # you WILL lose your data

# # List of files to deploy the compose from roles/compose-services/templates/
# compose_file_names:
#   - docker-compose.yml
#   - traefik-compose.yml
#   - authelia-compose.yml
# compose_recreate: true # redeploy the compose stack

#### SWARM #####

# keepalive settings (VRRP): provide a single virtual IP for the swarm
keepalive_virtual_ip: 192.168.255.100
keepalive_auth_pass: "{{ vaulted_keepalive_auth_pass if production_mode else 'secretpass' }}"
vaulted_keepalive_auth_pass: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          63666433613631316634636131393638383632346661366338346266623839326263653239336337
          3162363339383737323439313733326166663834613766300a643939353530313665633366393362
          61353366333763663465316261666636333266616432373566653334646135326263376366303464
          6161633962343837390a313964613666363934613835653433613930653934666235383830643166
          6231
# registry settings: private docker registry for swarm nodes
use_private_registry: true
registry_address: "registry.{{ domain_name }}:5000"
registry_nuke_data_directory: true

# swarm settings
swarm_force_reinit: true # force reinitialization of swarm on all nodes

# swarm services configuration
# Create directories to persist container data on {{ data_dir }}/[data_directory]
stack_data_directories:
  - pgdata
  - forgejo
  - redis
  - grafana
  - loki_data
  - prometheus_data
stack_nuke_data_directories: true # you WILL lose your data

# Set specific ownership/permissions for data directories
stack_dir_permissions:
  grafana:
    owner: "472"
    group: "472"
    mode: "0750"
  loki_data:
    owner: "10001"
    group: "10001"
    mode: "0750"
  prometheus_data:
    owner: "65534"
    group: "65534"
    mode: "0750"

# List of directories to copy files from roles/swarm-services/templates/configs/[config_directory]
# to {{ data_dir }}/configs/[config_directory] applying templating
stack_config_directories: 
  - traefik
  - pgsql
  - authelia
  - forgejo
  - grafana
  - alloy
  - prometheus
stack_nuke_config_directories: true # you WILL lose your data

# List of compose files to deploy the stack from roles/swarm-services/templates/
stack_file_names:
   - traefik-compose.yml
   - monitoring-compose.yml
   - docker-compose.yml
stack_recreate: true

# Enable/disable asserts 
enable_asserts: true

# Production/Development mode
production_mode: false

# Services variables (environment variables/config files)

# postgres
