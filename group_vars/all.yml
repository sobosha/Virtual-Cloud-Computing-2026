          3935636632636161610a636135336235613732323939363732616265353039386131373866343934
          6232
authelia_db: autheliadb
authelia_url: "https://auth.{{ domain_name }}"
authelia_port: 9091
authelia_port_metrics: 9959
# this path is for the Ansible role to generate the jwks key
jwks_key_path: "{{ data_dir }}/jwks/"
# OIDC clients list
authelia_oidc_clients:
  # forgejo client
  - id: "{{ forgejo_oidc_client_id}}"
    secret: "{{ forgejo_oidc_client_secret }}"
    token_endpoint_auth_method: "client_secret_post"
    authorization_policy: "one_factor"
    public: false
    redirect_uris:
      - "https://git.{{ domain_name }}/user/oauth2/authelia/callback"
    scopes:
      - "openid"
      - "profile"
      - "email"
      - "groups"
  # grafana client
  # TODO [VCC-016b]: Add grafana OIDC client configuration
  - id: "{{ grafana_oidc_client_id }}"
    secret: "{{ grafana_oidc_client_secret }}"
    # TODO fix: Grafana's OIDC client sends credentials in the POST request body.
    # We must match it here so Authelia doesn't reject the token exchange.
    token_endpoint_auth_method: "client_secret_post"
    authorization_policy: "one_factor"
    public: false
    redirect_uris:
      - "https://mon.{{ domain_name }}/login/generic_oauth"
    scopes:
      - "openid"
      - "profile"
      - "email"
      - "groups"

  
